
# set -g @tmux_colorful_color_scheme 'https://coolors.co/ff4e00-8ea604-f5bb00-ec9f05-bf3100'
# set -g allow-rename
set -g set-titles on
# set -g set-titles-string "#S:#I.#P - #W - #T" # Session:Window.Pane - Name - Title
set -g set-titles-string "#T" # Session:Window.Pane - Name - Title

set -g status-style "bg=black,fg=#86d6fe"
setw -g window-status-current-style "fg=black,bg=#afaf87"
set -g status-right "#[bg=black,fg=#86d6fe] #{pane_current_path}"
# set -g prefix C-Space

# set-option -g prefix C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix
# unbind-key -n 'l'
# unbind-key -n 'h'
# set -g window-status-current-style bg="#5294E2",fg=white
# set -g @tmux_power_theme 'slate'
# run-shell "tmux-power.tmux"
# set -g allow-rename on
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'
# unbind-key 'C-w'
unbind-key 't'
unbind-key ']'
bind-key -n C-l next-window
bind-key -n C-h previous-window
# bind-key -n C-Left previous-window
# bind-key -n C-Right next-window
unbind-key -n C-w
bind-key Escape kill-pane
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"
# bind t new-window -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}" "pwd && ls --color=auto; exec $SHELL"
bind s split-window -h -c "#{pane_current_path}" "pwd && ls --color=auto; exec $SHELL"
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R
# bind-key h send-keys -X C-Left
# bind-key j send-keys -X C-Down
# bind-key k send-keys -X C-Up
# bind-key l send-keys -X C-Right
# bind-key h 'send-keys c-Left'
# bind-key j 'send-keys c-Down'
# bind-key k 'send-keys c-Up'
# bind-key l 'send-keys c-Right'
# set -g @vim_navigator_mapping_left "C-Left"  # use C-h and C-Left
# set -g @vim_navigator_mapping_right "C-Right"
# set -g @vim_navigator_mapping_up "C-Up"
# set -g @vim_navigator_mapping_down "C-Down"
# set -g @vim_navigator_mapping_left "<prefix> h"  # use C-h and C-Left
# set -g @vim_navigator_mapping_right "C-Right"
# set -g @vim_navigator_mapping_up "C-Up"
# set -g @vim_navigator_mapping_down "C-Down"
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# bind
set -g mode-keys vi
setw -g mode-keys vi
set -g status-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "xclip -in -selection clipboard"
set-option -g set-clipboard external
bind-key -T copy-mode-vi C-k send-keys -X halfpage-up
bind-key -T copy-mode-vi C-j send-keys -X halfpage-down
# bind-key ']' run-shell "xclip -out -selection clipboard | tmux paste-buffer"
bind p run "xclip -o | tmux load-buffer - ; tmux paste-buffer"

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key h if-shell "$is_vim" "send-keys C-a C-h"  "select-pane -L"
bind-key j if-shell "$is_vim" "send-keys C-a C-j"  "select-pane -D"
bind-key k if-shell "$is_vim" "send-keys C-a C-k"  "select-pane -U"
bind-key l if-shell "$is_vim" "send-keys C-a C-l"  "select-pane -R"
bind-key ';' if-shell "$is_vim" "send-keys C-a C-^"  "select-pane -l" 
set -g @vim_navigator_mapping_prev "C-\\"
# removes the C-\\ binding

# bind v split-window -h -c "#{pane_current_path}" "vim"
# bind s split-window -v -c "#{pane_current_path}" "vim"
# source-file ~/.config/tmux/tmux.conf
# set-option -g prefix C-Space
set -g @vim_navigator_prefix_mapping_clear_screen ""
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'christoomey/vim-tmux-navigator'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '/usr/share/tmux-plugin-manager/tpm'






